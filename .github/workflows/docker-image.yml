name: Build and Push Docker Images

permissions:
  contents: read
  packages: write

on:
  push:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (full)
        id: meta_full
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw
            type=ref,event=branch
            type=ref,event=branch,suffix=-full
            type=semver,pattern={{version}}
            type=semver,pattern={{version}},suffix=-full
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}},suffix=-full
            type=semver,pattern={{major}}
            type=semver,pattern={{major}},suffix=-full
            type=sha,prefix
            type=sha,prefix,suffix=-full

      - name: Extract Docker metadata (base)
        id: meta_base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,suffix=-base
            type=ref,event=branch,suffix=-base
            type=semver,pattern={{version}}-base
            type=semver,pattern={{major}}.{{minor}}-base
            type=semver,pattern={{major}}-base
            type=sha,prefix,suffix=-base

      - name: Build and push BASE image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: base
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta_base.outputs.tags }}

      - name: Build and push FULL image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: full
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta_full.outputs.tags }}
